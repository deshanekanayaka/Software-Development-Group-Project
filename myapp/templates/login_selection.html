{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <title>Login – SKY Health Check</title>
  <style>
    body { background: #0c2d5d; min-height: 100vh; display:flex; align-items:center; justify-content:center; }
    .login-card { background:#fff; border-radius:16px; padding:2.5rem; min-width:360px; box-shadow:0 8px 40px rgba(0,0,0,.3); }
    .login-card h2 { color:#0c2d5d; font-weight:700; }
    .btn-sky { background:#009de0; color:#fff; border:none; }
    .btn-sky:hover { background:#007ab5; color:#fff; }
    .logo { height:40px; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="text-center mb-3">
    <img src="{% static 'css/images/Sky_Group_logo_2020.svg.png' %}" alt="SKY" class="logo mb-2"/>
    <h2>Health Check</h2>
    <p class="text-muted small">Sign in to your account</p>
  </div>
  {% for msg in messages %}
    <div class="alert alert-danger py-2 small">{{ msg }}</div>
  {% endfor %}
  <form method="POST" action="{% url 'login' %}">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label fw-semibold">Username</label>
      <input type="text" name="username" class="form-control" placeholder="username" required autofocus/>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Password</label>
      <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
    </div>
    <button type="submit" class="btn btn-sky-login w-100 py-2 fw-semibold">Sign In</button>
  </form>
  <hr/>
  <p class="text-center mb-0 small">Don't have an account? <a href="{% url 'register' %}">Register here</a></p>
</div>
</body>
</html>
