{% load static %}

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'css/styles.css' %}" />
    <title>Dashboard</title>
  </head>
  <body>
    <!-- navbar -->
    <nav class="navbar navbar-expand-md navbar-light pt-1 pb-1 mx-5 mt-3 rounded-2">
      <div class="container-xxl">
        <a class="navbar-brand" href="#intro"></a>
        <img src="assets/logo.png" alt="logo" width="50" height="30" class="logo" />
        <div class="collapse navbar-collapse justify-content-end align-center" id="main-nav">
          <ul class="navbar-nav">
            <li class="nav-item mx-4"><a class="nav-link" href="{% url 'votingPage' %}">VOTE</a></li>
            <li class="nav-item mx-4"><a class="nav-link" href="{% url 'landingPage' %}">HOME</a></li>
            <li class="nav-item mx-4"><a class="nav-link" href="#profile">PROFILE</a></li>
            <li class="nav-item mx-4"><a class="nav-link" href="{% url 'loginSelection' %}">SIGN IN</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Container -->
    <div class="main-container">
      <h1>Dashboard</h1>
      <div class="container mt-5">
        <div class="row">
          <!-- Left Chart: Pie -->
          <div class="col-md-6 d-flex flex-column align-items-center">
            <div id="chart-container-left">
              <canvas id="my-chart-left"></canvas>
            </div>
            <p class="chart-label text-white mt-2">Surveys that are sent</p>
          </div>

          <!-- Right Chart: Bar -->
          <div class="col-md-6 d-flex flex-column align-items-center position-relative">
            <a href="view.html" class="btn btn-sm btn-outline-light position-absolute top-0 end-0 me-3 mt-2">View</a>
            <div id="chart-container-right">
              <canvas id="my-chart-right"></canvas>
            </div>
            <p class="chart-label text-white mt-2">Summary of teams</p>
          </div>
        </div>
      </div>

      <!-- Bottom Right Buttons -->
      <div class="container-fluid">
        <div class="d-flex justify-content-end mt-5 mb-4 me-5">
          <a href="departments.html" class="btn btn-outline-light me-3">Other departments</a>
          <a href="cards.html" class="btn btn-primary">View Cards</a>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js"></script>
    <script>
      const dataLeft = {
        labels: ['Completed', 'Not Completed'],
        datasets: [{
          label: 'Completed surveys',
          data: [48, 52],
          backgroundColor: [
            'rgba(255, 99, 132, 0.6)',
            'rgba(255, 206, 86, 0.6)',
          ],
          borderWidth: 1
        }]
      };

      const optionsLeft = {
        plugins: {
          legend: {
            labels: { color: 'white' }
          },
          tooltip: {
            bodyColor: 'white',
            titleColor: 'white'
          }
        }
      };

      const ctxLeft = document.querySelector('#my-chart-left');
      const myChartLeft = new Chart(ctxLeft, {
        type: 'pie',
        data: dataLeft,
        options: optionsLeft
      });

      // Right Bar Chart for 3 Teams
      const dataRight = {
        labels: ['Good', 'Neutral', 'Bad'],
        datasets: [
          {
            label: 'Team A',
            data: [55, 30, 15],
            backgroundColor: 'rgba(0, 123, 255, 0.7)'
          },
          {
            label: 'Team B',
            data: [40, 35, 25],
            backgroundColor: 'rgba(40, 167, 69, 0.7)'
          },
          {
            label: 'Team C',
            data: [65, 20, 15],
            backgroundColor: 'rgba(255, 193, 7, 0.7)'
          }
        ]
      };

      const optionsRight = {
        plugins: {
          legend: {
            labels: { color: 'white' }
          },
          tooltip: {
            bodyColor: 'white',
            titleColor: 'white'
          }
        },
        scales: {
          x: {
            ticks: { color: 'white' },
            grid: { color: 'rgba(255,255,255,0.1)' }
          },
          y: {
            beginAtZero: true,
            ticks: { color: 'white' },
            grid: { color: 'rgba(255,255,255,0.1)' }
          }
        }
      };

      const ctxRight = document.querySelector('#my-chart-right');
      const myChartRight = new Chart(ctxRight, {
        type: 'bar',
        data: dataRight,
        options: optionsRight
      });
    </script>
  </body>
</html>
