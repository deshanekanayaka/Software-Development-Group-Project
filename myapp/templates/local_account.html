{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <link rel="stylesheet" href="{% static 'css/styles.css' %}" />
    <title>Local Account</title>
  </head>
  <body>
    <!-- navbar -->
    <nav
      class="navbar navbar-expand-md navbar-light pt-1 pb-1 mx-5 mt-3 rounded-2"
    >
      <div class="container-xxl">
        <a class="navbar-brand" href="#intro"></a>
        <img
          src="{% static 'assets/logo.png' %}"
          alt="logo"
          width="50"
          height="30"
          class="logo"
        />
        <div
          class="collapse navbar-collapse justify-content-end align-center"
          id="main-nav"
        >
          <ul class="navbar-nav">
            <li class="nav-item mx-4">
              <a class="nav-link" href="{% url 'votingPage' %}">VOTE</a>
            </li>
            <li class="nav-item mx-4">
              <a class="nav-link" href="{% url 'landingPage' %}">HOME</a>
            </li>
            <li class="nav-item mx-4">
              <a class="nav-link" href="#profile">PROFILE</a>
            </li>
            <li class="nav-item mx-4">
              <a class="nav-link" href="{% url 'loginSelection' %}">SIGN IN</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <section class="main-container">
      <form method="POST">
        {% csrf_token %}
        <h1 class="text-light text-center">Local Account Log In</h1>

        <!-- Dropdown -->
        <select
          name="role"
          id="role"
          class="role form-select form-select-sm mt-5 p-2 text-dark"
        >
          <option value="">Role</option>
          <option value="enginner">Engineer</option>
          <option value="team leader">Team Leader</option>
          <option value="dept leader">Dept Leader</option>
          <option value="sr manager">Sr Manager</option>
        </select>
        <i class="dropdown-icon fa-solid fa-circle-chevron-down"></i>

        <input
          type="text"
          placeholder="Code"
          id="code"
          class="mt-3 p-2 rounded-2"
        />
        <input
          type="text"
          placeholder="Username"
          id="username"
          class="mt-3 p-2 rounded-2"
        />
        <input
          type="text"
          placeholder="Email"
          id="email"
          class="mt-3 p-2 text-light"
        />
        <input
          type="text"
          placeholder="Password"
          id="password"
          class="mt-3 p-2 text-light"
        />

        <button type="submit" class="login-btn mt-3 p-2 text-light">
          Log In
        </button>

        <a href="forgot_password.html" class="link mt-3 p-2 text-light"
          >Forgot Password?</a
        >
      </form>
    </section>
  </body>
</html>
