{% load static %}

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="{% static 'css/styles.css' %}" />
    
    <title>Health Check Card Editor</title>
  </head>
  <body>
    <!-- navbar -->
    <nav
      class="navbar navbar-expand-md navbar-light pt-1 pb-1 mx-5 mt-3 rounded-2"
    >
      <div class="container-xxl">
        <a class="navbar-brand" href="#intro"> </a>
        <img src="{% static 'images/logo.png' %}" alt="" width="50" height="30" class="logo" />
        <!-- navbar links -->
        <div
          class="collapse navbar-collapse justify-content-end align-center"
          id="main-nav"
        >
          <ul class="navbar-nav">
            <li class="nav-item mx-4">
              <a class="nav-link" href="{% url 'votingPage' %}">VOTE</a>
            </li>
            <li class="nav-item mx-4">
              <a class="nav-link" href="{% url 'landingPage' %}">HOME</a>
            </li>
            <li class="nav-item mx-4">
              <a class="nav-link" href="#profile">PROFILE</a>
            </li>
            <li class="nav-item mx-4">
              <a class="nav-link" href="{% url 'loginSelection' %}">SIGN IN</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <!-- Container -->
    <div class="main-container py-5">
        <div class="row">
          <!-- Left column -->
          <div class="col-md-6 d-flex flex-column gap-3 mt-sm-3">
            <div style="width: 80%; margin: 0 auto;">
              <label for="session" class="form-label text-white">Choose a session</label>
              <select class="form-select" id="session">
                <option>Session 1</option>
                <option>Session 2</option>
              </select>
            </div>
            <button class="btn btn-secondary" style="width: 50%; margin: 0 auto;">Modify</button>
      
            <div class="mt-5" style="width: 80%; margin: 0 auto;">
              <label for="card" class="form-label text-white">Select Card</label>
              <select class="form-select" id="card">
                <option>Card A</option>
                <option>Card B</option>
              </select>
            </div>
            <button class="btn btn-secondary" style="width: 50%; margin: 0 auto;">Modify</button>
          </div>
      
          <!-- Right column -->
          <div class="col-md-6 d-flex justify-content-center align-items-center">
            <div class="bg-secondary" style="width: 200px; height: 200px; display: flex; align-items: center; justify-content: center; color: white;">
              Img/Icon
            </div>
          </div>
        </div>
      </div>

  </body>
</html>
